version: '3.8'

# Windows Docker Beta Stack for Omni.Thooft
# Port: 81 (App), 8091 (DB)
# Data: pb_data_beta

services:
  app:
    image: docker.io/geldofa/thooft_omni:latest
    ports:
      - "81:80"
    environment:
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped
    container_name: beta_thooft_omni

  db_init:
    image: docker.io/geldofa/thooft_omni:latest
    command: ["sync"]
    volumes:
      - pb_migrations_relay_beta:/relay/migrations
      - pb_hooks_relay_beta:/relay/hooks
    container_name: beta_thooft_db_init

  db:
    image: alpine:latest
    ports:
      - "8091:8090"
    volumes:
      - "${OMNI_DOCS_PATH:-C:\\Users\\Public\\Documents\\Docker}\\pb_data_beta:/pb/pb_data"
      - "${OMNI_DOCS_PATH:-C:\\Users\\Public\\Documents\\Docker}\\jdf_beta:/pb/jdf"
      - pb_migrations_relay_beta:/pb/pb_migrations:ro
      - pb_hooks_relay_beta:/pb/pb_hooks:ro
    environment:
      - POCKETBASE_ADMIN_EMAIL=${ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
      - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
      - JDF_PATH=/pb/jdf/
    restart: unless-stopped
    container_name: beta_thooft_db
    depends_on:
      db_init:
        condition: service_completed_successfully
      rclone:
        condition: service_started
    command: >
      sh -c '
        [ ! -f /pb/.pb_ready ] && {
          apk add --no-cache curl unzip ca-certificates git &&
          ARCH=$$(uname -m) &&
          if [ "$$ARCH" = "x86_64" ]; then PB_ARCH="amd64"; else PB_ARCH="arm64"; fi &&
          curl -L "https://github.com/pocketbase/pocketbase/releases/download/v0.23.12/pocketbase_0.23.12_linux_$${PB_ARCH}.zip" -o /tmp/pb.zip &&
          unzip -o /tmp/pb.zip -d /pb/ &&
          touch /pb/.pb_ready
        }
        /pb/pocketbase superuser upsert "$${POCKETBASE_ADMIN_EMAIL}" "$${POCKETBASE_ADMIN_PASSWORD}" --dir=/pb/pb_data &&
        /pb/pocketbase migrate up --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations &&
        chown -R root:root /pb/pb_data &&
        chmod -R 755 /pb/pb_data &&
        /pb/pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations --hooksDir=/pb/pb_hooks
      '

  rclone:
    image: rclone/rclone:latest
    container_name: beta_thooft_rclone
    volumes:
      - "${OMNI_DOCS_PATH:-C:\\Users\\Public\\Documents\\Docker}\\pb_data_beta\\rclone:/config/rclone"
      - "${OMNI_DOCS_PATH:-C:\\Users\\Public\\Documents\\Docker}\\pb_data_beta\\backups:/backups"
    command: "rcd --rc-addr :5572 --rc-no-auth"
    restart: unless-stopped

volumes:
  pb_migrations_relay_beta:
  pb_hooks_relay_beta:
